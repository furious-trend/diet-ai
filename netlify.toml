[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev:vite"
  targetPort = 5173
  framework = "#static"

# Rewrite API requests to the Netlify function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Fallback for React Router (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
